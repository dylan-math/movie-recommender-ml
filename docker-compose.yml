# Worker + Recommender. Worker reads ratings from plotwise Postgres (plotwise_default network).
services:
  worker:
    build: .
    command: uvicorn worker_service:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    volumes:
      - ./artifacts:/app/artifacts:ro
      - ./train_data:/app/train_data:ro
      - ./data:/app/data
    environment:
      # Container path (host ./artifacts mounted at /app/artifacts)
      RECOM_ARTIFACT_DIR: /app/artifacts/registry/snap-phase-a-20260602T225455Z
      WORKER_STATE_DIR: /app/data/worker_state
      DATABASE_URL: ${DATABASE_URL}
      RECOMMENDER_URL: http://recommender:8001
      DB_POLL_INTERVAL_SECONDS: ${DB_POLL_INTERVAL_SECONDS:-30}
      RETRAIN_THRESHOLD: ${RETRAIN_THRESHOLD:-0}
      RETRAIN_CHECK_INTERVAL_SECONDS: ${RETRAIN_CHECK_INTERVAL_SECONDS:-60}
      # Recommender restores vectors from ./data; skip 12k-user bulk push on every container start
      WORKER_PUSH_RECOMMENDER_ON_START: "0"
      TRAIN_INTERACTIONS_PATH: ${TRAIN_INTERACTIONS_PATH:-/app/train_data/movielens/interactions.parquet}
      TRAIN_OUTPUT_ROOT: ${TRAIN_OUTPUT_ROOT:-/app/artifacts/registry}
      TRAIN_CONFIG_PATH: ${TRAIN_CONFIG_PATH:-/app/train_config.yaml}
      CUDA_PATH: /usr
      PLOTWISE_ITEM_DATA_DIR: /app/data/plotwise_item_data
    networks:
      - default
      - plotwise
    depends_on:
      - recommender

  recommender:
    build: .
    command: uvicorn recommender_service:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    volumes:
      - ./artifacts:/app/artifacts:ro
      - ./data:/app/data
    environment:
      RECOM_ARTIFACT_DIR: /app/artifacts/registry/snap-phase-a-20260602T225455Z
      RECOM_STATE_DIR: /app/data/recommender_state
      WORKER_URL: http://worker:8002
      RECOM_SYNC_FROM_WORKER_ON_START: "0"
      PLOTWISE_ITEM_DATA_DIR: /app/data/plotwise_item_data

networks:
  plotwise:
    external: true
    name: plotwise_default
